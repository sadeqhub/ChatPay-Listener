# Optional reference config. CI uses `porter apply` (no -f), same as ChatPay-Worker —
# build/run settings live in Porter after the first dashboard deploy.
# GitHub secret is auto-created when you connect this repo in Porter (not a copy-paste token).

version: v2
name: chatpay-listener

services:
  - name: webhook
    type: web
    run: npm start
    port: 3000
    cpuCores: 0.25
    ramMegabytes: 512
    healthCheck:
      enabled: true
      httpPath: /health
      initialDelaySeconds: 15

build:
  method: docker
  context: .
  dockerfile: ./Dockerfile

env:
  NODE_ENV: production
