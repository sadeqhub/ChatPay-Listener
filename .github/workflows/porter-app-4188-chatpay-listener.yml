# Porter-managed workflow. Secret PORTER_APP_12884_4188 is created when you connect
# this repo in Porter (app chatpay-listener → GitHub).

name: Deploy to Porter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  porter-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require Porter token
        env:
          T1: ${{ secrets.PORTER_APP_12884_4188 }}
          T2: ${{ secrets.PORTER_APP_12884_16264 }}
        run: |
          if [ -z "$T1" ] && [ -z "$T2" ]; then
            echo "::error::Missing GitHub secret. In Porter: chatpay-listener → GitHub → connect sadeqhub/ChatPay-Listener (creates PORTER_APP_12884_4188)."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Github tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup porter
        uses: porter-dev/setup-porter@v0.1.0

      - name: Deploy stack
        timeout-minutes: 30
        env:
          T1: ${{ secrets.PORTER_APP_12884_4188 }}
          T2: ${{ secrets.PORTER_APP_12884_16264 }}
          PORTER_CLUSTER: "4188"
          PORTER_HOST: https://dashboard.porter.run
          PORTER_PROJECT: "12884"
          PORTER_APP_NAME: chatpay-listener
          PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          if [ -n "$T1" ]; then export PORTER_TOKEN="$T1"; else export PORTER_TOKEN="$T2"; fi
          porter apply -f porter.yaml
