# Porter-generated style (same pattern as ChatPay-Worker).
# No manual "deploy token": connect this repo in Porter → app chatpay-listener → GitHub.
# Porter installs a repo secret named PORTER_APP_12884_<appId> automatically.
#
# After connecting, open GitHub → Settings → Secrets → Actions and use the secret name
# Porter created (Worker uses PORTER_APP_12884_16264). Update the line below if different.

"on":
  push:
    branches:
      - main
name: Deploy to chatpay-listener
jobs:
  porter-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Github tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Setup porter
        uses: porter-dev/setup-porter@v0.1.0
      - name: Deploy stack
        timeout-minutes: 30
        run: porter apply
        env:
          PORTER_APP_NAME: chatpay-listener
          PORTER_CLUSTER: "4188"
          PORTER_HOST: https://dashboard.porter.run
          PORTER_PROJECT: "12884"
          PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
          PORTER_TOKEN: ${{ secrets.PORTER_APP_12884_16264 }}
