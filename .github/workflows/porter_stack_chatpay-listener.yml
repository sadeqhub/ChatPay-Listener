# Auto-deploy to Porter on push to main.
#
# Required GitHub secret (exact name): PORTER_APP_12884_4188
# Create it from Porter: app → Settings / Integrations / GitHub Actions → copy deploy token,
# then GitHub → Settings → Secrets and variables → Actions → New repository secret.
# If Porter shows a different secret name, update both the secret name in GitHub and
# every `secrets.*` reference below.
#
# Note: GitHub does not evaluate `secrets.*` in job `if:` reliably, so we verify the
# token in a shell step (fails fast with a clear error instead of "porter auth login").

name: Deploy to Porter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  porter-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Porter GitHub token is configured
        env:
          PORTER_GH_TOKEN: ${{ secrets.PORTER_APP_12884_4188 }}
        run: |
          if [ -z "$PORTER_GH_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret PORTER_APP_12884_4188. In Porter, open this app → Integrations / GitHub → copy the token. In GitHub: repo Settings → Secrets and variables → Actions → create a secret with exactly that name, then re-run the workflow."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Github tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup porter
        uses: porter-dev/setup-porter@v0.1.0

      - name: Deploy stack
        timeout-minutes: 30
        run: porter apply -f porter.yaml
        env:
          PORTER_CLUSTER: "4188"
          PORTER_HOST: https://dashboard.porter.run
          PORTER_PROJECT: "12884"
          PORTER_APP_NAME: chatpay-listener
          PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
          PORTER_TOKEN: ${{ secrets.PORTER_APP_12884_4188 }}
