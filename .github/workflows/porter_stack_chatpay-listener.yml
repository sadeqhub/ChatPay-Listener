# Auto-deploy to Porter on push to main.
#
# Required GitHub secret (exact name): PORTER_APP_12884_4188
# Create it from Porter: open app → Settings / Integrations / GitHub Actions (wording varies)
# → generate or copy the deploy token → GitHub repo → Settings → Secrets and variables → Actions.
# If Porter shows a different secret name (e.g. PORTER_STACK_12884_4188), change both the
# secret name in GitHub and the `secrets.*` reference below to match.

name: Deploy to Porter

on:
  push:
    branches:
      - main

jobs:
  porter-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require Porter token secret
        if: ${{ secrets.PORTER_APP_12884_4188 == '' }}
        run: |
          echo "::error::Missing GitHub Actions secret PORTER_APP_12884_4188. Porter prints a suggested secret name when you connect CI—add that token under Settings → Secrets → Actions with the exact name, then re-run this workflow."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Github tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup porter
        uses: porter-dev/setup-porter@v0.1.0

      - name: Deploy stack
        timeout-minutes: 30
        run: porter apply -f porter.yaml
        env:
          PORTER_CLUSTER: "4188"
          PORTER_HOST: https://dashboard.porter.run
          PORTER_PROJECT: "12884"
          PORTER_APP_NAME: chatpay-listener
          PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
          PORTER_TOKEN: ${{ secrets.PORTER_APP_12884_4188 }}
