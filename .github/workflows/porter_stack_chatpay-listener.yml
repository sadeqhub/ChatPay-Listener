# Porter auto-deploy (required path/name for Porter GitHub integration).
# Add ONE GitHub Actions secret (Porter → chatpay-listener → Integrations → GitHub Actions):
#   PORTER_APP_12884_4188  or  PORTER_STACK_12884_4188

name: Deploy to Porter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  porter-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Github tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup porter
        uses: porter-dev/setup-porter@v0.1.0

      - name: Deploy stack
        timeout-minutes: 30
        env:
          PORTER_APP_TOKEN: ${{ secrets.PORTER_APP_12884_4188 }}
          PORTER_STACK_TOKEN: ${{ secrets.PORTER_STACK_12884_4188 }}
          PORTER_CLUSTER: "4188"
          PORTER_HOST: https://dashboard.porter.run
          PORTER_PROJECT: "12884"
          PORTER_APP_NAME: chatpay-listener
          PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          if [ -n "$PORTER_APP_TOKEN" ]; then
            export PORTER_TOKEN="$PORTER_APP_TOKEN"
          elif [ -n "$PORTER_STACK_TOKEN" ]; then
            export PORTER_TOKEN="$PORTER_STACK_TOKEN"
          else
            echo "::error::Missing Porter token. GitHub → Settings → Secrets → Actions → add PORTER_APP_12884_4188 (from Porter Integrations → GitHub Actions)."
            exit 1
          fi
          porter apply -f porter.yaml
