# Porter auto-deploy — requires a GitHub Actions secret (see scripts/setup-porter-github-secret.sh).
# Accepted secret names (use the name Porter shows in Integrations → GitHub Actions):
#   PORTER_APP_12884_4188  |  PORTER_STACK_12884_4188  |  PORTER_TOKEN

name: Deploy to Porter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  porter-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require Porter deploy token
        env:
          T1: ${{ secrets.PORTER_APP_12884_4188 }}
          T2: ${{ secrets.PORTER_STACK_12884_4188 }}
          T3: ${{ secrets.PORTER_TOKEN }}
        run: |
          if [ -z "$T1" ] && [ -z "$T2" ] && [ -z "$T3" ]; then
            echo "::error::No Porter token in GitHub Secrets. Run: ./scripts/setup-porter-github-secret.sh"
            echo "::error::Or add secret PORTER_APP_12884_4188 at https://github.com/sadeqhub/ChatPay-Listener/settings/secrets/actions"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Github tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup porter
        uses: porter-dev/setup-porter@v0.1.0

      - name: Deploy stack
        timeout-minutes: 30
        env:
          T1: ${{ secrets.PORTER_APP_12884_4188 }}
          T2: ${{ secrets.PORTER_STACK_12884_4188 }}
          T3: ${{ secrets.PORTER_TOKEN }}
          PORTER_CLUSTER: "4188"
          PORTER_HOST: https://dashboard.porter.run
          PORTER_PROJECT: "12884"
          PORTER_APP_NAME: chatpay-listener
          PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          if [ -n "$T1" ]; then export PORTER_TOKEN="$T1"
          elif [ -n "$T2" ]; then export PORTER_TOKEN="$T2"
          else export PORTER_TOKEN="$T3"
          fi
          porter apply -f porter.yaml --wait
